<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Render Products</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-black-400 p-4">
    <h1 class="text-4xl font-bold mb-8 text-center">Product-Data</h1>
    <div class="container mx-auto flex flex-col lg:flex-row">
      <p id="loading-text" class="text-center mb-4"></p>
      <table class="table-auto w-full bg-blue-200 shadow-md rounded-lg">
        <thead>
          <tr class="bg-gray-200 text-lg font-semibold">
            <th class="px-4 py-2">No.</th>
            <th class="px-4 py-2">Name</th>
            <th class="px-4 py-2">Price (USD)</th>
            <th class="px-4 py-2">Type</th>
          </tr>
        </thead>
        <tbody id="product-list"></tbody>
      </table>
    </div>
    <div class="copy text-center mt-8">
      <p>By using API&copy</p>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
